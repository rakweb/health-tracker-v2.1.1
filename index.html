<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Health Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#0b1220" />
<meta name="app-version" content="2.1.0">

<!-- ✅ Theme bootstrap -->
<script>
(function () {
  const saved = localStorage.getItem('HT_THEME');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = saved || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
})();
</script>

<!-- ✅ CSS -->
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/theme-dark.css">
<link rel="stylesheet" href="/css/theme-light.css">
<link rel="stylesheet" href="/css/range-slider.css">

<!-- ✅ PWA -->
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon-192.png">

<!-- ✅ Libraries -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" defer></script>

<!-- ✅ App Scripts -->
<script src="/js/range-slider.js" defer></script>
<script src="/js/app.js" defer></script>

<style>
body { margin:0; font-family:system-ui; }
header { padding:12px; border-bottom:1px solid #ccc; display:flex; justify-content:space-between; }
.btn { padding:8px 12px; cursor:pointer; }
.wrap { max-width:1200px; margin:auto; padding:12px; }
</style>

</head>

<body>

<header>
  <div>
    <h1>Health Tracker</h1>
    <div id="appVersion"></div>
  </div>
  <div>
    <button id="btnInstall" class="btn" style="display:none">Install</button>
    <button id="btnTheme" class="btn">🌙</button>
  </div>
</header>

<main class="wrap">
  <!-- ✅ KEEP ALL YOUR ORIGINAL UI CONTENT EXACTLY AS IS HERE -->
</main>

<!-- ✅ Version display -->
<script>
window.addEventListener('load', () => {
  const el = document.getElementById('appVersion');
  const meta = document.querySelector('meta[name="app-version"]');
  if (el && meta) el.textContent = "v" + meta.content;
});
</script>

<!-- ✅ Theme toggle -->
<script>
window.addEventListener('load', () => {
  const btn = document.getElementById('btnTheme');
  if (!btn) return;

  const update = () => {
    btn.textContent =
      document.documentElement.getAttribute('data-theme') === 'dark'
        ? '☀️'
        : '🌙';
  };

  update();

  btn.onclick = () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('HT_THEME', next);
    update();
  };
});
</script>

<!-- ✅ Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .then(() => console.log('✅ SW registered'));
  });
}
</script>

<!-- ✅ Install button -->
<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('btnInstall').style.display = 'inline-block';
});

document.getElementById('btnInstall').onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
};
</script>

<!-- ✅ Chart theme (SINGLE CLEAN VERSION) -->
<script>
(function () {
  const root = document.documentElement;

  function applyTheme() {
    if (!window.Chart) return;

    const light =
      root.getAttribute('data-theme') === 'light' ||
      root.getAttribute('data-pdf-export') === '1';

    const text = light ? '#0a1220' : '#e6eefc';
    const grid = light ? 'rgba(10,18,32,0.15)' : 'rgba(230,238,252,0.15)';

    Chart.defaults.color = text;

    Chart.defaults.scale = Chart.defaults.scale || {};
    Chart.defaults.scale.grid = Chart.defaults.scale.grid || {};
    Chart.defaults.scale.grid.color = grid;

    const ch = Chart.getChart('metricsChart');
    if (ch) ch.update();
  }

  window.addEventListener('load', applyTheme);

  new MutationObserver(applyTheme).observe(document.documentElement, {
    attributes: true,
    attributeFilter: ['data-theme', 'data-pdf-export']
  });
})();
</script>

</body>
</html>
